<svg
  class="h-8 w-8 animate-bounce-slow"
  viewBox="0 0 100 100"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <style>
    .line {
      stroke-dasharray: 200;
      stroke-dashoffset: 200;
      animation: draw 1.5s ease forwards;
    }

    .float {
      animation: float 2.5s ease-in-out infinite;
    }

    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
  </style>

  <g class="float">
    <path class="line"
      d="M20 30 H35 L42 65 H78"
      stroke="#000000"
      stroke-width="10"
      stroke-linecap="round"/>

    <circle cx="45" cy="75" r="6" fill="#000000"/>
    <circle cx="70" cy="75" r="6" fill="#000000"/>

    <path class="line"
      d="M55 15 L55 40 M45 25 L55 15 L65 25"
      stroke="#000000"
      stroke-width="8"
      stroke-linecap="round"/>
  </g>
</svg>