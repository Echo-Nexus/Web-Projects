<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBESTAY - 404 ERROR</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* VibeStay Signature Brand Gradient */
            --primary-gradient: linear-gradient(135deg, #FF385C 0%, #FF8A65 100%);
            --text-dark: #1A1A1A;
            --text-muted: #64748b;
            --bg-color: #f8fafc;
        }

        /* Dark Mode variables */
        @media (prefers-color-scheme: dark) {
            :root {
                --text-dark: #f1f5f9;
                --text-muted: #94a3b8;
                --bg-color: #121212;
            }
        }

        /* Support manual dark class if handled by localStorage */
        .dark {
            --text-dark: #f1f5f9;
            --text-muted: #94a3b8;
            --bg-color: #121212;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Glowing background blobs matching VibeStay theme */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255, 56, 92, 0.15);
            filter: blur(80px);
            border-radius: 50%;
            top: 10%;
            left: 10%;
            z-index: -1;
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: rgba(255, 138, 101, 0.15);
            filter: blur(100px);
            border-radius: 50%;
            bottom: 5%;
            right: 5%;
            z-index: -1;
        }

        .container {
            text-align: center;
            padding: 24px;
            max-width: 550px;
            width: 100%;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Abstract Monogram brand logo matching the header style */
        .brand-logo {
            color: #FF385C;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 2rem;
            text-decoration: none;
            user-select: none;
        }

        .brand-logo svg {
            height: 32px;
            width: 32px;
        }

        .brand-name {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.05em;
        }

        .error-code {
            font-size: 9rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 1.5rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            animation: float 4s ease-in-out infinite;
            letter-spacing: -0.04em;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-16px); }
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 800;
            margin-bottom: 1rem;
            color: var(--text-dark);
            letter-spacing: -0.03em;
        }

        p {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            line-height: 1.6;
            max-width: 460px;
            margin-left: auto;
            margin-right: auto;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background-color: #FF385C;
            color: white;
            text-decoration: none;
            padding: 16px 36px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 25px -5px rgba(255, 56, 92, 0.3);
        }

        .btn svg {
            transition: transform 0.3s ease;
        }

        .btn:hover {
            transform: scale(1.03) translateY(-2px);
            background-color: #E31C5F;
            box-shadow: 0 20px 30px -5px rgba(255, 56, 92, 0.4);
        }

        .btn:hover svg {
            transform: translateX(-4px);
        }

        .btn:active {
            transform: scale(0.98) translateY(0);
        }

        /* Mobile specific adjustments */
        @media (max-width: 480px) {
            .error-code { font-size: 6.5rem; }
            h1 { font-size: 1.75rem; }
            p { font-size: 1rem; }
            .btn { padding: 14px 28px; width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- VibeStay Geometric Logo Header -->
        <a href="/" class="brand-logo">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M15 25L50 85L85 25" stroke="currentColor" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M35 25L50 55L65 25" stroke="currentColor" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="brand-name">vibestay</span>
        </a>

        <div class="error-code">404</div>
        <h1>Page Not Found</h1>
        <p>The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
        
        <!-- Premium Navigation back button -->
        <a href="/" class="btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Back to Homepage
        </a>
    </div>

    <!-- Live Sync theme toggle state from localStorage -->
    <script>
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</body>
</html>
